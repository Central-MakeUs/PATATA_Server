spring:
  datasource:
    url: jdbc:h2:mem:patata-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  social-login:
    provider:
      apple:
        client-id: test-apple-client-id
        key-id: test-apple-key-id
        team-id: test-apple-team-id
        private-key: test-private-key
      google:
        client-id:
          android: test-google-android-client-id
          ios: test-google-ios-client-id

jwt:
  secretKey: test-secret-key-test-secret-key-test-secret-key

cloud:
  aws:
    credentials:
      access-key: test-access-key
      secret-key: test-secret-key
    region:
      static: ap-northeast-2
    s3:
      bucket: test-bucket
