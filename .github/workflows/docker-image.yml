name: Deploy to AWS EC2 using Docker - PATATA

on:
  push:
    branches:
      - develop

env:
  CONTAINER_NAME: patata-server
  DOCKER_USERNAME: dodopoo
  DOCKER_IMAGE_NAME: dodopoo/patata-server:quick
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  APPLICATION_YML: ${{ secrets.APPLICATION }}
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

jobs:
  build-and-push-docker:

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up application.yml
        run: echo "${{ env.APPLICATION_YML }}" > ./src/main/resources/application.yml

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
        with:
          gradle-version: 8.11.1
          cache-disabled: true
        
      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Login to Docker Hub using Access Token
        run: echo "${{ env.DOCKER_HUB_TOKEN }}" | docker login -u ${{ env.DOCKER_USERNAME }} --password-stdin

      - name: Build the Docker image
        run: docker build --platform linux/amd64 -t ${{ env.DOCKER_IMAGE_NAME }} .

      - name: Push the Docker image
        run: docker push ${{ env.DOCKER_IMAGE_NAME }}


  deploy-to-ec2:

    needs: build-and-push-docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ env.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/
            sudo docker pull ${{ env.DOCKER_IMAGE_NAME }}
            sudo docker stop ${{ env.CONTAINER_NAME }} || true
            sudo docker rm ${{ env.CONTAINER_NAME }} || true
            sudo docker run -d --name ${{ env.CONTAINER_NAME }} --restart unless-stopped -p 8080:8080 -e TZ=Asia/Seoul ${{ env.DOCKER_IMAGE_NAME }}
            sudo docker image prune -f
